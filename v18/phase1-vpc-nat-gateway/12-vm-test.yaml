---
# Cloud-init Secret for test VM
# Sets up routing via the NAT gateway (172.20.10.254)
apiVersion: v1
kind: Secret
metadata:
  name: test-egress-cloudinit
  namespace: default
  labels:
    harvesterhci.io/cloud-init-template: harvester
type: secret
stringData:
  userdata: |
    #cloud-config
    chpasswd:
      expire: false
      users:
        - {name: root, password: changeme, type: text}
    ssh_pwauth: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEyay7snwSq9smkxPzX3FQMpfOEHfXxawh133C/+Dvi5 gonzo@psyche
    package_update: true
    packages:
      - qemu-guest-agent
      - curl
    runcmd:
      - [systemctl, enable, --now, qemu-guest-agent.service]
      # Default route via NAT gateway
      - [ip, route, replace, default, via, 172.20.10.254]
  networkdata: ""
---
# Test VM on internal overlay network
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: test-egress
  namespace: default
  labels:
    harvesterhci.io/creator: harvester
    harvesterhci.io/os: linux
  annotations:
    harvesterhci.io/vmRunStrategy: RerunOnFailure
    harvesterhci.io/volumeClaimTemplates: >-
      [{"metadata":{"name":"test-egress-disk-0","annotations":{"harvesterhci.io/imageId":"default/opensuse-leap-15-6"}},"spec":{"accessModes":["ReadWriteMany"],"resources":{"requests":{"storage":"10Gi"}},"volumeMode":"Block","storageClassName":"longhorn-opensuse-leap-15-6"}}]
spec:
  runStrategy: RerunOnFailure
  template:
    metadata:
      labels:
        harvesterhci.io/vmName: test-egress
    spec:
      architecture: amd64
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        devices:
          disks:
            - bootOrder: 1
              disk:
                bus: virtio
              name: disk-0
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - name: overlay
              model: virtio
              bridge: {}
        machine:
          type: q35
        memory:
          guest: 1Gi
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 125m
            memory: 512Mi
      networks:
        - name: overlay
          multus:
            networkName: default/vswitchinternal
      terminationGracePeriodSeconds: 120
      volumes:
        - name: disk-0
          persistentVolumeClaim:
            claimName: test-egress-disk-0
        - name: cloudinitdisk
          cloudInitNoCloud:
            secretRef:
              name: test-egress-cloudinit

# VpcEgressGateway - requires --non-primary-cni-mode=true (Kube-OVN >= v1.15.0)
#
# On v1.7.1 this crashed with "Nexthop has invalid gateway" because pod eth0
# was Canal, not Kube-OVN. With --non-primary-cni-mode in v1.8.0-rc2,
# Kube-OVN should handle the overlay interface correctly as a secondary NIC.
apiVersion: kubeovn.io/v1
kind: VpcEgressGateway
metadata:
  name: egress-default
  namespace: default
spec:
  vpc: ovn-cluster
  replicas: 1
  internalSubnet: subnetinternal
  externalSubnet: macvlan-external-subnet
  policies:
    - snat: true
      subnets:
        - subnetinternal
